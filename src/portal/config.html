<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LettaBot Config</title>
<base href="/portal/">
<link rel="stylesheet" href="shared.css">
<style>
  /* Config editor layout */
  .layout { display: flex; gap: 24px; }
  .sidebar { min-width: 180px; position: sticky; top: 24px; align-self: flex-start; }
  .main { flex: 1; min-width: 0; }

  /* Sidebar nav */
  .sidebar nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-heading { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px 4px; }
  .sidebar a {
    display: block;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: #888;
    text-decoration: none;
  }
  .sidebar a:hover { color: #ccc; background: #141414; }
  .sidebar a:focus-visible { outline: 2px solid #7cb3ff; outline-offset: 2px; }
  .sidebar a[aria-current="true"] { color: #fff; background: #1a1a1a; }
  .sidebar a.indent { padding-left: 24px; font-size: 12px; }

  /* Section */
  .config-section { margin-bottom: 32px; scroll-margin-top: 16px; }

  /* Fieldset */
  fieldset {
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    margin: 0 0 16px 0;
    background: #141414;
  }
  legend {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    padding: 0 8px;
  }

  /* Agent header */
  .agent-header {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #222;
  }

  /* Field row */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 13px;
    color: #ccc;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .field .description { font-size: 12px; color: #666; margin-top: 2px; }
  .field .error-text { font-size: 12px; color: #d1242f; margin-top: 2px; }

  /* Checkbox field */
  .field-checkbox { display: flex; align-items: center; gap: 8px; }
  .field-checkbox input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1a7f37; }
  .field-checkbox label { margin-bottom: 0; cursor: pointer; }

  /* Array field */
  .array-items { display: flex; flex-direction: column; gap: 4px; }
  .array-row { display: flex; gap: 4px; align-items: center; }
  .array-row input { flex: 1; }
  .array-add { margin-top: 4px; }

  /* Banner */
  .banner {
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
    background: #2d1b00;
    border: 1px solid #5a3600;
    color: #ffb347;
  }

  /* Top bar */
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 16px; }
  .top-bar h1 { margin-bottom: 0; }

  /* Back link */
  .back-link { font-size: 13px; color: #666; margin-bottom: 16px; display: inline-block; }
  .back-link:hover { color: #aaa; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: #555; }

  /* Group config sub-fieldset */
  .group-fieldset { margin-top: 8px; border-color: #1a1a1a; background: #0f0f0f; }
  .group-fieldset legend { font-size: 12px; color: #888; }

  @media (max-width: 600px) {
    .layout { flex-direction: column; }
    .sidebar { position: static; }
  }
</style>
</head>
<body>
<div class="container" style="max-width: 900px;">
  <a href="/portal" class="back-link">&larr; Back to Portal</a>

  <!-- Auth form -->
  <section class="card" id="auth">
    <form id="auth-form">
      <label for="key">API Key</label>
      <input type="password" id="key" placeholder="Paste your LETTABOT_API_KEY" autocomplete="off">
      <p style="margin-top: 10px; font-size: 12px; color: #888;">
        Find your API key at <a href="https://app.letta.com/projects/default-project/api-keys" target="_blank" rel="noopener noreferrer">app.letta.com</a>.
      </p>
      <button type="submit" class="btn btn-primary" style="margin-top: 12px;">Connect</button>
    </form>
  </section>

  <!-- Main app -->
  <main id="app" class="hidden">
    <div class="top-bar">
      <h1>LettaBot <span class="subtitle">Config</span></h1>
      <button type="button" class="btn btn-success" id="save-btn" disabled>Save</button>
    </div>
    <div id="restart-banner" class="banner hidden" role="status">
      Changes saved. Restart lettabot for them to take effect.
    </div>
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main" id="editor">
        <p class="loading">Loading config&hellip;</p>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script src="shared.js"></script>
<script>
let schema = { global: [], agent: {} };
let config = {};
let changes = {};
let currentSection = null;

// ── Auth ──────────────────────────────────────────────────────────────────────

document.getElementById('auth-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const key = document.getElementById('key').value.trim();
  if (!key) return;
  setApiKey(key);
  init();
});

function onUnauthorized() {
  document.getElementById('auth').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  showToast('Invalid API key', true);
}

async function init() {
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await loadData();
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const [schemaRes, configRes] = await Promise.all([
      apiFetch('/api/v1/config/schema', {}, onUnauthorized),
      apiFetch('/api/v1/config', {}, onUnauthorized),
    ]);
    const schemaJson = await schemaRes.json();
    const configJson = await configRes.json();
    schema = schemaJson.schema || { global: [], agent: {} };
    config = configJson.config || {};
    changes = {};
    renderSidebar();
    renderEditor();
    updateSaveBtn();
    observeSections();
  } catch (e) {
    if (e.message === 'Unauthorized') return;
    document.getElementById('editor').innerHTML = '<p class="empty">Failed to load config: ' + esc(e.message) + '</p>';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function getNestedValue(obj, dotPath) {
  return dotPath.split('.').reduce((o, k) => {
    if (o && typeof o === 'object') {
      // Handle numeric keys for array access
      const idx = Number(k);
      return Array.isArray(o) && !isNaN(idx) ? o[idx] : o[k];
    }
    return undefined;
  }, obj);
}

function setNestedValue(obj, dotPath, value) {
  const parts = dotPath.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = parts[i];
    const nextKey = parts[i + 1];
    const needArray = /^\d+$/.test(nextKey);
    if (!cur[k] || typeof cur[k] !== 'object') cur[k] = needArray ? [] : {};
    cur = cur[k];
  }
  cur[parts[parts.length - 1]] = value;
}

function getChangedOrConfig(dotPath) {
  const changedVal = getNestedValue(changes, dotPath);
  if (changedVal !== undefined) return changedVal;
  return getNestedValue(config, dotPath);
}

function getAgents() {
  const configAgents = Array.isArray(config.agents) && config.agents.length > 0
    ? [...config.agents]
    : [{ name: config.agent?.name || 'default', ...config.agent, channels: config.channels, features: config.features, conversations: config.conversations }];

  // Include agents that only exist in changes (newly added)
  if (Array.isArray(changes.agents)) {
    for (let i = configAgents.length; i < changes.agents.length; i++) {
      if (changes.agents[i]) configAgents.push(changes.agents[i]);
    }
  }
  return configAgents;
}

function isMultiAgent() {
  return (Array.isArray(config.agents) && config.agents.length > 0) ||
         (Array.isArray(changes.agents) && changes.agents.length > 0);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function renderSidebar() {
  const nav = el('nav', { 'aria-label': 'Config sections' });

  // Global sections
  nav.append(el('div', { className: 'nav-heading' }, 'Global'));
  for (const group of schema.global) {
    nav.append(makeSidebarLink('section-' + group.id, group.label));
  }

  // Per-agent sections
  const agents = getAgents();
  for (let i = 0; i < agents.length; i++) {
    const agentName = agents[i].name || 'Agent ' + (i + 1);
    const prefix = 'agent-' + i;
    nav.append(el('div', { className: 'nav-heading' }, agentName));
    nav.append(makeSidebarLink(prefix + '-info', 'Agent'));
    nav.append(makeSidebarLink(prefix + '-features', 'Features', true));
    nav.append(makeSidebarLink(prefix + '-conversations', 'Conversations', true));

    // Channel sub-links — show all channel types
    for (const chKey of Object.keys(schema.agent.channels || {})) {
      nav.append(makeSidebarLink(prefix + '-ch-' + chKey, schema.agent.channels[chKey].label, true));
    }
  }

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  sidebar.append(nav);
}

function makeSidebarLink(targetId, label, indent) {
  const link = el('a', {
    href: '#' + targetId,
    className: indent ? 'indent' : '',
    onClick: (e) => {
      e.preventDefault();
      setActiveSection(targetId);
      document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth' });
    },
  }, label);
  if (currentSection === targetId) link.setAttribute('aria-current', 'true');
  return link;
}

function setActiveSection(id) {
  currentSection = id;
  document.querySelectorAll('.sidebar a').forEach(l =>
    l.setAttribute('aria-current', l.getAttribute('href') === '#' + id ? 'true' : 'false')
  );
}

// ── Editor ────────────────────────────────────────────────────────────────────

function renderEditor() {
  const editor = document.getElementById('editor');
  editor.innerHTML = '';

  // Global sections
  for (const group of schema.global) {
    const section = el('section', { className: 'config-section', id: 'section-' + group.id });
    const fieldset = el('fieldset', null, el('legend', null, group.label));
    for (const field of group.fields) {
      fieldset.append(buildField(field, field.key));
    }
    section.append(fieldset);
    editor.append(section);
  }

  // Per-agent sections
  const agents = getAgents();
  const multi = isMultiAgent();

  for (let i = 0; i < agents.length; i++) {
    const agent = agents[i];
    const agentName = agent.name || 'Agent ' + (i + 1);
    const pathPrefix = multi ? 'agents.' + i + '.' : '';
    const idPrefix = 'agent-' + i;

    // Agent info
    const infoSection = el('section', { className: 'config-section', id: idPrefix + '-info' });
    const infoFs = el('fieldset', null, el('legend', null, agentName + ' \u2014 Agent'));
    for (const field of (schema.agent.info || [])) {
      infoFs.append(buildField(field, pathPrefix + field.key));
    }
    infoSection.append(infoFs);
    editor.append(infoSection);

    // Features
    const featSection = el('section', { className: 'config-section', id: idPrefix + '-features' });
    const featFs = el('fieldset', null, el('legend', null, agentName + ' \u2014 Features'));
    for (const field of (schema.agent.features || [])) {
      featFs.append(buildField(field, pathPrefix + field.key));
    }
    featSection.append(featFs);
    editor.append(featSection);

    // Conversations
    const convSection = el('section', { className: 'config-section', id: idPrefix + '-conversations' });
    const convFs = el('fieldset', null, el('legend', null, agentName + ' \u2014 Conversations'));
    for (const field of (schema.agent.conversations || [])) {
      convFs.append(buildField(field, pathPrefix + field.key));
    }
    convSection.append(convFs);
    editor.append(convSection);

    // Channels — show all channel types
    for (const [chKey, chSchema] of Object.entries(schema.agent.channels || {})) {
      const chData = agent.channels?.[chKey];

      const chSection = el('section', { className: 'config-section', id: idPrefix + '-ch-' + chKey });
      const chFs = el('fieldset', null, el('legend', null, agentName + ' \u2014 ' + chSchema.label));
      const chPath = pathPrefix + 'channels.' + chKey + '.';

      for (const field of chSchema.fields) {
        chFs.append(buildField(field, chPath + field.key));
      }

      // Group config
      if (schema.agent.groupConfig) {
        const groupContainer = el('div', { style: 'margin-top: 12px;' });
        groupContainer.append(el('p', { style: 'font-size: 13px; color: #ccc; font-weight: 500; margin-bottom: 8px;' }, 'Group Settings'));

        // Merge group keys from config + changes
        const configGroups = chData?.groups || {};
        const changedGroups = getNestedValue(changes, chPath + 'groups') || {};
        const allGroupKeys = [...new Set([...Object.keys(configGroups), ...Object.keys(changedGroups)])];
        for (const gKey of allGroupKeys) {
          groupContainer.append(buildGroupFieldset(gKey, chPath, schema.agent.groupConfig));
        }

        // Add group button
        const addRow = el('div', { style: 'display: flex; gap: 4px; align-items: center; margin-top: 8px;' });
        const addInput = el('input', {
          type: 'text',
          placeholder: 'Group ID (or * for default)',
          'aria-label': 'New group ID for ' + chSchema.label,
          style: 'flex: 1;',
        });
        const addBtn = el('button', {
          type: 'button',
          className: 'btn btn-ghost btn-sm',
          onClick: () => {
            const gId = addInput.value.trim();
            if (!gId) { showToast('Enter a group ID', true); return; }
            // Initialize empty group in changes so fields render
            setNestedValue(changes, chPath + 'groups.' + gId + '.mode', null);
            addInput.value = '';
            renderEditor();
            observeSections();
            // Focus the new group fieldset
            const newFs = document.getElementById('group-' + idPrefix + '-' + chKey + '-' + gId);
            if (newFs) newFs.scrollIntoView({ behavior: 'smooth' });
          },
        }, '+ Add Group');
        addRow.append(addInput, addBtn);
        groupContainer.append(addRow);

        chFs.append(groupContainer);
      }

      chSection.append(chFs);
      editor.append(chSection);
    }
  }

  // Add Agent button
  if (multi) {
    const addAgentSection = el('section', { className: 'config-section', id: 'add-agent' });
    const addAgentBtn = el('button', {
      type: 'button',
      className: 'btn btn-ghost',
      style: 'width: 100%;',
      onClick: () => {
        const name = prompt('Agent name:');
        if (!name || !name.trim()) return;
        // Add a new agent to the changes
        const idx = agents.length;
        setNestedValue(changes, 'agents.' + idx + '.name', name.trim());
        setNestedValue(changes, 'agents.' + idx + '.channels', {});
        renderEditor();
        renderSidebar();
        observeSections();
        updateSaveBtn();
        document.getElementById('agent-' + idx + '-info')?.scrollIntoView({ behavior: 'smooth' });
      },
    }, '+ Add Agent');
    addAgentSection.append(addAgentBtn);
    editor.append(addAgentSection);
  }
}

function buildGroupFieldset(gKey, chPath, groupFields) {
  const gFs = el('fieldset', { className: 'group-fieldset' },
    el('legend', null, gKey === '*' ? 'Default (*)' : gKey)
  );
  for (const gField of groupFields) {
    gFs.append(buildField(gField, chPath + 'groups.' + gKey + '.' + gField.key));
  }
  return gFs;
}

// ── Field builders ────────────────────────────────────────────────────────────

function effectiveValue(configVal, field) {
  // If config has an explicit value, use it. Otherwise fall back to schema default.
  return configVal !== undefined ? configVal : field.default;
}

function buildField(field, dataPath) {
  const rawVal = getChangedOrConfig(dataPath);
  const currentVal = effectiveValue(rawVal, field);
  const fieldId = 'field-' + dataPath.replace(/\./g, '-');
  const descId = fieldId + '-desc';

  if (field.type === 'boolean') {
    return buildCheckbox(field, fieldId, currentVal, dataPath);
  }
  if (field.type === 'string[]') {
    return buildArrayField(field, fieldId, currentVal, dataPath);
  }

  const wrapper = el('div', { className: 'field' });
  wrapper.append(el('label', { for: fieldId }, field.label));

  let input;
  if (field.type === 'enum') {
    input = el('select', { id: fieldId, 'aria-describedby': field.description ? descId : null });
    if (!field.required) input.append(el('option', { value: '' }, '(not set)'));
    for (const opt of (field.options || [])) {
      const option = el('option', { value: opt }, opt);
      if (String(currentVal) === opt) option.selected = true;
      input.append(option);
    }
    if (currentVal !== undefined && currentVal !== null) input.value = String(currentVal);
  } else if (field.type === 'secret') {
    const isSet = getNestedValue(config, dataPath + '_isSet') || (currentVal && currentVal !== '\u2022\u2022\u2022\u2022\u2022\u2022');
    input = el('input', {
      type: 'password',
      id: fieldId,
      placeholder: isSet ? '(set \u2014 enter new value to change)' : '(not set)',
      'aria-describedby': field.description ? descId : null,
      autocomplete: 'off',
    });
  } else if (field.type === 'number') {
    input = el('input', {
      type: 'number',
      id: fieldId,
      value: currentVal != null ? String(currentVal) : '',
      placeholder: field.default != null ? 'Default: ' + field.default : '',
      'aria-describedby': field.description ? descId : null,
    });
  } else {
    input = el('input', {
      type: 'text',
      id: fieldId,
      value: currentVal != null ? String(currentVal) : '',
      placeholder: field.default != null ? 'Default: ' + field.default : '',
      'aria-describedby': field.description ? descId : null,
    });
  }

  input.addEventListener('input', () => trackChange(field, input, dataPath));
  input.addEventListener('change', () => trackChange(field, input, dataPath));
  wrapper.append(input);

  if (field.description) {
    wrapper.append(el('p', { className: 'description', id: descId }, field.description));
  }
  return wrapper;
}

function buildCheckbox(field, fieldId, currentVal, dataPath) {
  const wrapper = el('div', { className: 'field' });
  const row = el('div', { className: 'field-checkbox' });
  const input = el('input', { type: 'checkbox', id: fieldId });
  if (currentVal === true || currentVal === 'true') input.checked = true;
  input.addEventListener('change', () => {
    setNestedValue(changes, dataPath, input.checked);
    updateSaveBtn();
  });
  row.append(input);
  row.append(el('label', { for: fieldId }, field.label));
  wrapper.append(row);
  if (field.description) {
    wrapper.append(el('p', { className: 'description' }, field.description));
  }
  return wrapper;
}

function buildArrayField(field, fieldId, currentVal, dataPath) {
  const wrapper = el('div', { className: 'field' });
  wrapper.append(el('label', null, field.label));

  const container = el('div', { className: 'array-items' });

  function renderItems() {
    container.innerHTML = '';
    const currentItems = getChangedOrConfig(dataPath);
    const arr = Array.isArray(currentItems) ? [...currentItems] : [''];
    if (arr.length === 0) arr.push('');

    for (let i = 0; i < arr.length; i++) {
      const row = el('div', { className: 'array-row' });
      const input = el('input', {
        type: 'text',
        value: arr[i] || '',
        'aria-label': field.label + ' item ' + (i + 1),
      });
      input.addEventListener('input', () => {
        arr[i] = input.value;
        setNestedValue(changes, dataPath, arr.filter(v => v.trim() !== ''));
        updateSaveBtn();
      });
      row.append(input);

      if (arr.length > 1) {
        row.append(el('button', {
          type: 'button',
          className: 'btn btn-ghost btn-sm',
          'aria-label': 'Remove item ' + (i + 1),
          onClick: () => {
            arr.splice(i, 1);
            setNestedValue(changes, dataPath, arr.filter(v => v.trim() !== ''));
            updateSaveBtn();
            renderItems();
          },
        }, '\u00d7'));
      }
      container.append(row);
    }

    container.append(el('button', {
      type: 'button',
      className: 'btn btn-ghost btn-sm array-add',
      onClick: () => {
        const curArr = getChangedOrConfig(dataPath);
        setNestedValue(changes, dataPath, Array.isArray(curArr) ? [...curArr, ''] : ['']);
        renderItems();
        const inputs = container.querySelectorAll('input');
        if (inputs.length > 0) inputs[inputs.length - 1].focus();
      },
    }, '+ Add'));
  }

  renderItems();
  wrapper.append(container);
  if (field.description) {
    wrapper.append(el('p', { className: 'description' }, field.description));
  }
  return wrapper;
}

// ── Change tracking ───────────────────────────────────────────────────────────

function trackChange(field, input, dataPath) {
  let value;
  if (field.type === 'number') {
    value = input.value === '' ? null : Number(input.value);
  } else if (field.type === 'secret') {
    if (input.value === '') return;
    value = input.value;
  } else {
    value = input.value === '' ? null : input.value;
  }
  setNestedValue(changes, dataPath, value);
  updateSaveBtn();
}

function updateSaveBtn() {
  document.getElementById('save-btn').disabled = Object.keys(changes).length === 0;
}

// ── Save ──────────────────────────────────────────────────────────────────────

document.getElementById('save-btn').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Saving\u2026';

  try {
    const res = await apiFetch('/api/v1/config', {
      method: 'PUT',
      body: JSON.stringify({ config: changes }),
    }, onUnauthorized);
    const json = await res.json();

    if (json.success) {
      showToast('Config saved');
      if (json.restartRequired) {
        document.getElementById('restart-banner').classList.remove('hidden');
      }
      await loadData();
    } else {
      showToast(json.error || 'Save failed', true);
    }
  } catch (e) {
    showToast('Error: ' + e.message, true);
  }

  btn.disabled = false;
  btn.textContent = 'Save';
});

// ── Scroll spy ────────────────────────────────────────────────────────────────

const observer = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    if (entry.isIntersecting) setActiveSection(entry.target.id);
  }
}, { rootMargin: '-20% 0px -60% 0px' });

function observeSections() {
  document.querySelectorAll('.config-section').forEach(s => observer.observe(s));
}

// ── Init ──────────────────────────────────────────────────────────────────────

if (getApiKey()) init();
</script>
</body>
</html>
